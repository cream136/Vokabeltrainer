<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vokabeltrainer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Vokabeltrainer</h1>

    <div class="top-grid">
      <section class="panel preview-panel">
        <h2>Vorschau</h2>
        <div id="upcoming-list" class="upcoming-list">
          <div class="upcoming-item">Lädt...</div>
        </div>
      </section>

      <section class="panel quiz-panel">
        <h2>Übersetzung</h2>
        <div id="word-container">
          <div class="word-pair">
            <span id="english-word">Lädt...</span>
            <input type="text" id="german-input" placeholder="Deutsche Übersetzung" autocomplete="off">
            <button id="check-btn">Prüfen</button>
          </div>
          <div id="result"></div>
        </div>
        <div class="button-row">
          <button id="next-btn" class="hidden">Nächstes Wort</button>
          <button id="restart-btn" class="secondary">Neu starten</button>
        </div>
        <div class="add-word-panel">
          <h3>Neues Wort hinzufügen</h3>
          <div class="panel-note">Gib ein englisches Wort und seine deutsche Übersetzung ein.</div>
          <div class="add-row">
            <input type="text" id="new-english" placeholder="English">
            <input type="text" id="new-german" placeholder="German">
            <button id="add-word-btn">Hinzufügen</button>
          </div>
        </div>
      </section>
    </div>

    <div class="stats-panel">
      <div class="stat-card">
        <span>Richtig</span>
        <strong id="correct-count">0</strong>
        <div class="word-list" id="correct-words"></div>
      </div>
      <div class="stat-card">
        <span>Falsch</span>
        <strong id="incorrect-count">0</strong>
        <div class="word-list" id="incorrect-words"></div>
      </div>
      <div class="stat-card">
        <span>Versuche</span>
        <strong id="total-count">0</strong>
      </div>
      <div class="stat-card">
        <span>Anzahl der gesamten Fragen in der Excel Tabelle</span>
        <strong id="total-words">0</strong>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>

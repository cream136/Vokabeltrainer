<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vokabeltrainer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Vokabeltrainer</h1>
    <div id="word-container">
      <div class="word-pair">
        <span id="english-word"></span>
        <input type="text" id="german-input" placeholder="Deutsche Übersetzung">
        <button id="check-btn">Prüfen</button>
      </div>
      <div id="result"></div>
    </div>
    <button id="next-btn">Nächstes Wort</button>
  </div>
  <script src="script.js"></script>
</body>
</html>
